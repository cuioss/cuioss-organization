name: CodeQL Analysis (Reusable)

on:
  workflow_call:
    inputs:
      languages:
        description: 'Comma-separated list of languages to analyze (e.g., "java", "javascript", "python")'
        required: true
        type: string
      query-suite:
        description: 'Query suite to use (default, security-extended, security-and-quality)'
        required: false
        type: string
        default: 'default'
      build-command:
        description: 'Custom build command (for compiled languages). Leave empty for autobuild.'
        required: false
        type: string
        default: ''
      build-mode:
        description: 'CodeQL build mode: autobuild | none | manual. Leave empty to use CodeQL''s per-language default (current behavior).'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJson(inputs.languages) }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: ${{ matrix.language }}
          queries: +security-and-quality
          build-mode: ${{ inputs.build-mode }}

      - name: Autobuild
        if: inputs.build-mode != 'none' && inputs.build-mode != 'manual' && inputs.build-command == ''
        uses: github/codeql-action/autobuild@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3

      - name: Custom build
        if: inputs.build-mode != 'none' && inputs.build-command != ''
        run: ${{ inputs.build-command }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:${{ matrix.language }}"
