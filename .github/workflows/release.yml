name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Generate Release Token
        id: release-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: cuioss

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.release-token.outputs.token }}
          fetch-depth: 0

      - name: Read project metadata
        id: metadata
        uses: ./.github/actions/read-project-config

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "cuioss-release-bot"

      - name: Pre-update internal action references
        run: |
          python3 workflow-scripts/update-workflow-references.py \
            --version "${{ steps.metadata.outputs.current-version }}" \
            --internal-only

      - name: Commit internal reference updates
        run: |
          git add -A || true
          if git diff --staged --quiet; then
            echo "No internal reference changes"
          else
            git commit -m "chore: pre-update internal action references for v${{ steps.metadata.outputs.current-version }}"
          fi

      - name: Create version tag
        id: tag
        run: |
          VERSION="v${{ steps.metadata.outputs.current-version }}"
          echo "Creating tag: $VERSION"
          git tag -a "$VERSION" -m "Release $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get tag SHA
        id: sha
        run: |
          SHA=$(git rev-parse "${{ steps.tag.outputs.version }}^{commit}")
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Tag SHA: $SHA"

      - name: Update all workflow references
        run: |
          python3 workflow-scripts/update-workflow-references.py \
            --version "${{ steps.metadata.outputs.current-version }}" \
            --sha "${{ steps.sha.outputs.sha }}"

      - name: Commit reference updates
        run: |
          git add -A || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update workflow references to ${{ steps.tag.outputs.version }}"
          fi

      - name: Push commits and tag
        uses: ad-m/github-push-action@4cc74773234f74829a8c21bc4d69dd4be9cfa599 # v1.1.0
        with:
          github_token: ${{ steps.release-token.outputs.token }}
          branch: ${{ github.ref_name }}
          tags: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          token: ${{ steps.release-token.outputs.token }}
          tag_name: ${{ steps.tag.outputs.version }}
          name: ${{ steps.tag.outputs.version }}
          generate_release_notes: ${{ steps.metadata.outputs.create-github-release == 'true' }}
          make_latest: true
          body: |
            ## SHA for workflow references

            Use this SHA to reference cuioss-organization workflows:

            ```
            ${{ steps.sha.outputs.sha }}
            ```

            ### Example usage

            ```yaml
            jobs:
              build:
                uses: cuioss/cuioss-organization/.github/workflows/reusable-maven-build.yml@${{ steps.sha.outputs.sha }} # ${{ steps.tag.outputs.version }}
                secrets: inherit
            ```

      - name: Update consumer repos
        id: update-consumers
        env:
          GH_TOKEN: ${{ steps.release-token.outputs.token }}
        run: |
          VERSION="${{ steps.metadata.outputs.current-version }}"
          SHA="${{ steps.sha.outputs.sha }}"
          CONSUMERS="${{ steps.metadata.outputs.consumers }}"

          # Collect results for summary
          RESULTS_FILE=$(mktemp)
          echo "RESULTS_FILE=$RESULTS_FILE" >> "$GITHUB_OUTPUT"
          echo "[]" > "$RESULTS_FILE"

          for REPO in $CONSUMERS; do
            OUTPUT=$(python3 "$GITHUB_WORKSPACE/workflow-scripts/update-consumer-repo.py" \
              --repo "$REPO" \
              --version "$VERSION" \
              --sha "$SHA" 2>&1) || true
            echo "$OUTPUT"

            # Extract RESULT JSON line
            RESULT_LINE=$(echo "$OUTPUT" | grep '^RESULT:' | sed 's/^RESULT://')
            if [ -n "$RESULT_LINE" ]; then
              # Append repo name and result to results file
              jq --arg repo "$REPO" --argjson result "$RESULT_LINE" \
                '. += [{"repo": $repo} + $result]' "$RESULTS_FILE" > "${RESULTS_FILE}.tmp" \
                && mv "${RESULTS_FILE}.tmp" "$RESULTS_FILE"
            fi
          done

          # Build initial release summary
          {
            echo "## Release v${VERSION} Summary"
            echo ""
            echo "**Version:** v${VERSION}"
            echo "**SHA:** \`${SHA}\`"
            echo ""

            if [ -n "$CONSUMERS" ]; then
              echo "### Consumer Repository Updates"
              echo ""
              echo "| Repository | Status | PR |"
              echo "|---|---|---|"

              jq -r '.[] |
                if .status == "pr_auto_merge_enabled" then
                  "| " + .repo + " | :hourglass: Auto-merge enabled | [PR](" + (.pr_url // "-") + ") |"
                elif .status == "pr_created" then
                  "| " + .repo + " | :arrow_right: PR Created | [PR](" + (.pr_url // "-") + ") |"
                elif .status == "no_changes" then
                  "| " + .repo + " | :heavy_minus_sign: No Changes | - |"
                else
                  "| " + .repo + " | :x: Error | " + (.error // "unknown") + " |"
                end' "$RESULTS_FILE"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify consumer PR merges
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.release-token.outputs.token }}
        run: |
          RESULTS_FILE="${{ steps.update-consumers.outputs.RESULTS_FILE }}"
          if [ -n "$RESULTS_FILE" ] && [ -f "$RESULTS_FILE" ]; then
            python3 "$GITHUB_WORKSPACE/workflow-scripts/verify-consumer-prs.py" \
              --results-file "$RESULTS_FILE" \
              --timeout 300
            rm -f "$RESULTS_FILE"
          else
            echo "No results file found, skipping verification"
          fi
