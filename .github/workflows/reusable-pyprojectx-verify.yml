name: Pyprojectx Verify (Reusable)
# Reusable workflow for projects using pyprojectx (pw) build system

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use (empty = let uv manage)'
        required: false
        type: string
        default: ''
      cache-dependency-glob:
        description: 'Glob pattern for uv cache dependencies'
        required: false
        type: string
        default: 'uv.lock'
      upload-artifacts-on-failure:
        description: 'Upload test artifacts on failure'
        required: false
        type: boolean
        default: false
      verify-goals:
        description: >-
          Space-separated pw goals to run, in order (e.g. 'quality-gate
          module-tests'). Each goal is run as './pw <goal>'; the first failing
          goal fails the job. Goal tokens must match [a-z][a-z0-9-]* — anything
          else fails the run.
        required: false
        type: string
        default: 'verify'
      verify-args:
        description: >-
          Extra arguments appended to every goal invocation (e.g. a module
          filter). The pyprojectx equivalent of the maven reusable's profile
          inputs.
        required: false
        type: string
        default: ''
      skip-on-docs-only:
        description: >-
          Skip verify when only documentation/config files changed (footprint
          filter). Opt-in — the default (false) preserves the current
          always-verify behavior; each consumer enables it explicitly, matching
          the maven reusable's toggle. Never skips a merge_group run.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# Cancel a superseded in-progress run only for pull requests: pushing a new commit
# to a PR makes the older run's result irrelevant, so freeing that runner speeds up
# feedback. Grouped by caller workflow + ref + event so a push, a PR, and a
# merge_group run never share a group. cancel-in-progress is deliberately limited to
# pull_request: push runs on the default branch and merge_group runs (the merge
# queue) must always run to completion and are never cancelled.
#
# This is complementary to — not overlapping with — the gate job below. The gate
# skips a REDUNDANT run (a push whose commit an open PR already covers); concurrency
# cancels a SUPERSEDED run (an older commit on the same PR). merge_group runs are
# excluded from both: the gate always builds them, and they are never cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Decide whether this run should proceed, from two independent skip reasons:
  #   1. Footprint skip (opt-in via skip-on-docs-only): every changed path is a
  #      non-building doc/config file, so the heavy verify is unnecessary.
  #   2. Push-dedup skip: a push whose commit is already covered by an open PR
  #      (the PR's own run verifies that commit), so the push run is redundant.
  # Either reason can skip. A merge_group run always builds (no reliable diff
  # base — the merge-queue must verify the full merge result), and the default
  # branch always runs unless the footprint skip applies. The `conclusion` job
  # reports SUCCESS when the gate deliberately skips verify, which keeps a
  # skipped run merge-queue-safe.
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      # Footprint filter (opt-in via skip-on-docs-only): decide whether any
      # changed path is a building file. Skipped entirely on merge_group — a
      # merge-queue run has no reliable diff base and must build the full merge
      # result. The paths-filter step is continue-on-error so a diff-base error
      # fails OPEN: `footprint.outcome` is then not 'success' and the decide step
      # runs the verification rather than skipping it.
      - name: Checkout
        if: ${{ inputs.skip-on-docs-only && github.event_name != 'merge_group' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build paths-filter spec
        id: build-filter
        if: ${{ inputs.skip-on-docs-only && github.event_name != 'merge_group' }}
        run: |
          {
            echo 'spec<<EOF'
            echo 'buildable:'
            echo "  - '!**/*.adoc'"
            echo "  - '!**/*.md'"
            echo "  - '!doc/**'"
            echo "  - '!.plan/**'"
            echo "  - '!.claude/**'"
            echo "  - '!LICENSE'"
            echo "  - '!NOTICE'"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      # predicate-quantifier MUST be 'every': the spec is all-negation, so
      # dorny's default 'some' would OR the patterns and any non-.adoc file would
      # match '!**/*.adoc', leaving 'buildable' always true. 'every' ANDs them,
      # so a path counts as buildable only when it matches none of the ignore
      # globs — i.e. buildable == 'false' iff EVERY changed path is non-building.
      - name: Footprint filter
        id: footprint
        if: ${{ inputs.skip-on-docs-only && github.event_name != 'merge_group' }}
        continue-on-error: true
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          predicate-quantifier: 'every'
          filters: ${{ steps.build-filter.outputs.spec }}

      - name: Decide whether to run
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          SKIP_ON_DOCS_ONLY: ${{ inputs.skip-on-docs-only }}
          FOOTPRINT_OUTCOME: ${{ steps.footprint.outcome }}
          BUILDABLE: ${{ steps.footprint.outputs.buildable }}
        run: |
          # A merge-queue run has no reliable diff base and must build the full
          # merge result — always run.
          if [[ "$EVENT_NAME" == "merge_group" ]]; then
            echo "merge_group run — building the full merge result"
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Footprint skip (independent of the push-dedup skip below — either can
          # skip). Fail-open: skip ONLY when the paths-filter ran cleanly
          # (outcome 'success') AND reported no buildable paths. Any filter or
          # diff-base error (outcome != 'success') falls through and runs verify.
          if [[ "$SKIP_ON_DOCS_ONLY" == "true" && "$FOOTPRINT_OUTCOME" == "success" && "$BUILDABLE" == "false" ]]; then
            echo "Only non-building (docs/config) files changed — skipping verify"
            echo "run=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Non-push events (pull_request, workflow_dispatch, …) always run.
          if [[ "$EVENT_NAME" != "push" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # The default branch always runs.
          if [[ "$REF_NAME" == "$DEFAULT_BRANCH" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Push to a non-default branch: skip if an open SAME-REPO PR already
          # covers it — the pull_request run verifies the same commit. Only internal
          # PRs count: a fork PR that happens to reuse this branch name verifies a
          # different repo's commit, so cross-repository PRs are excluded (gh's
          # --head matches a bare branch name across forks). Fail open — a transient
          # lookup error runs the verification rather than skipping it.
          if ! count="$(gh pr list --repo "$GH_REPO" --head "$REF_NAME" --state open --json number,isCrossRepository --jq '[.[] | select(.isCrossRepository == false)] | length')"; then
            echo "PR lookup failed for '$REF_NAME' — defaulting to run push verification"
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if [[ "${count:-0}" -gt 0 ]]; then
            echo "Open same-repo PR exists for '$REF_NAME' — skipping push run (the PR run verifies this commit)"
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "No open same-repo PR for '$REF_NAME' — running push verification"
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

  verify:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Read project.yml configuration
        id: config
        uses: cuioss/cuioss-organization/.github/actions/read-project-config@779947f2776ea45e512b1676787c6cd78e8c334a # v0.13.0

      - name: Set up Python ${{ steps.config.outputs.pyprojectx-python-version || inputs.python-version }}
        if: ${{ (steps.config.outputs.pyprojectx-python-version || inputs.python-version) != '' }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ steps.config.outputs.pyprojectx-python-version || inputs.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: ${{ steps.config.outputs.pyprojectx-cache-dependency-glob || inputs.cache-dependency-glob }}

      # Resolve config-over-input, then validate BEFORE anything reaches a `run:`
      # command line. Config text is untrusted: it is carried in via env (never
      # interpolated into the shell body) and every goal token must match the
      # conservative allowlist, so no goal can smuggle shell metacharacters.
      - name: Resolve and validate build targets
        id: targets
        env:
          VERIFY_GOALS: ${{ steps.config.outputs.pyprojectx-verify-goals || inputs.verify-goals }}
          VERIFY_ARGS: ${{ steps.config.outputs.pyprojectx-verify-args || inputs.verify-args }}
        run: |
          if [[ -z "${VERIFY_GOALS// /}" ]]; then
            echo "::error::verify-goals is empty — expected at least one pw goal"
            exit 1
          fi
          for goal in $VERIFY_GOALS; do
            if [[ ! "$goal" =~ ^[a-z][a-z0-9-]*$ ]]; then
              echo "::error::invalid pw goal '$goal' — goals must match [a-z][a-z0-9-]*"
              exit 1
            fi
          done
          echo "Resolved goals: $VERIFY_GOALS"
          echo "Resolved args: ${VERIFY_ARGS:-<none>}"
          {
            echo "goals=$VERIFY_GOALS"
            echo "args=$VERIFY_ARGS"
          } >> "$GITHUB_OUTPUT"

      # GitHub Actions cannot emit a dynamic number of steps, so the goals are run
      # in one step with a ::group:: per goal. The loop exits on the first failure
      # and annotates which goal failed, giving the same attribution a per-goal step
      # name would.
      - name: Run verification
        env:
          GOALS: ${{ steps.targets.outputs.goals }}
          ARGS: ${{ steps.targets.outputs.args }}
        run: |
          for goal in $GOALS; do
            echo "::group::./pw $goal"
            # ARGS is deliberately unquoted so it word-splits into separate
            # arguments; it is data for pw, never a shell command.
            if ! ./pw "$goal" $ARGS; then
              echo "::endgroup::"
              echo "::error::pw goal '$goal' failed"
              exit 1
            fi
            echo "::endgroup::"
          done

      - name: Upload test results
        # project.yml wins when it sets the key; the input applies only when unset.
        if: >-
          ${{ failure() && (steps.config.outputs.pyprojectx-upload-artifacts-on-failure == 'true'
          || (steps.config.outputs.pyprojectx-upload-artifacts-on-failure == '' && inputs.upload-artifacts-on-failure)) }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: |
            .pytest_cache/
            .mypy_cache/
          retention-days: 5

  # Gate job for branch protection — always runs, reports the aggregate result.
  # Require `verify / conclusion` in branch protection (uniform with the Maven build).
  conclusion:
    if: always()
    needs: [gate, verify]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Evaluate workflow result
        run: |
          # A gate-job failure/cancellation must fail — never mask it as a skip.
          if [[ "${{ needs.gate.result }}" != "success" ]]; then
            echo "::error::gate job did not succeed (${{ needs.gate.result }})"
            exit 1
          fi
          # Gate deliberately skipped this run (a push whose commit is covered by an
          # open PR) — the verify job is skipped on purpose, so report success.
          if [[ "${{ needs.gate.outputs.run }}" != "true" ]]; then
            echo "Gate skipped this run (open PR covers the commit)"
            exit 0
          fi
          if [[ "${{ needs.verify.result }}" == "failure" || "${{ needs.verify.result }}" == "cancelled" ]]; then
            echo "::error::verify job failed or was cancelled"
            exit 1
          fi
          echo "verify passed or was correctly skipped"
