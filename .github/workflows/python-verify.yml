name: Python Verify

on:
  push:
    branches: [main, "feature/*", "fix/*", "dependabot/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read  # the reusable workflow's gate reads open PRs to skip redundant push runs

jobs:
  verify:
    uses: ./.github/workflows/reusable-pyprojectx-verify.yml
