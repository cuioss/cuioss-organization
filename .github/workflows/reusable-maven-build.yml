name: Maven Build (Reusable)

on:
  workflow_call:
    inputs:
      java-versions:
        description: 'JSON array of Java versions to test'
        required: false
        type: string
        default: '["21","25"]'
      enable-sonar:
        description: 'Enable SonarCloud analysis'
        required: false
        type: boolean
        default: true
      enable-snapshot-deploy:
        description: 'Deploy snapshots to Maven Central'
        required: false
        type: boolean
        default: true
      npm-cache:
        description: 'Enable npm package caching'
        required: false
        type: boolean
        default: false
      maven-profiles-snapshot:
        description: 'Maven profiles for snapshot deployment'
        required: false
        type: string
        default: 'release-snapshot,javadoc'
      skip-sonar-on-dependabot:
        description: 'Skip Sonar analysis for Dependabot PRs'
        required: false
        type: boolean
        default: true
      java-version:
        description: 'Java version for Sonar analysis and snapshot deploy'
        required: false
        type: string
        default: '21'
      skip-on-docs-only:
        description: 'Skip build when only documentation/config files changed'
        required: false
        type: boolean
        default: true
      paths-ignore-extra:
        description: 'Space-separated extra glob patterns to treat as non-code'
        required: false
        type: string
        default: ''
      snapshot-deploy-timeout:
        description: 'Timeout in minutes for the snapshot deploy job'
        required: false
        type: number
        default: 30
    secrets:
      SONAR_TOKEN:
        required: false
      OSS_SONATYPE_USERNAME:
        required: false
      OSS_SONATYPE_PASSWORD:
        required: false
      GPG_PRIVATE_KEY:
        required: false
      GPG_PASSPHRASE:
        required: false

permissions:
  contents: read

# Cancel a superseded in-progress run only for pull requests: pushing a new commit
# to a PR makes the older run's result irrelevant, so freeing that runner speeds up
# feedback. Grouped by caller workflow + ref + event so a push, a PR, and a
# merge_group run never share a group. cancel-in-progress is deliberately limited to
# pull_request: push runs on the default branch (snapshot deploy) and merge_group runs
# (the merge queue) must always run to completion and are never cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Decide whether this run should proceed. Skips a push-triggered build when an
  # open PR already covers the same branch — the PR's own run builds that commit
  # (and produces a Sonar pull-request analysis), so the push build is redundant.
  # A push to a branch with no open PR still builds (branch analysis + quality),
  # and the default branch always builds (Sonar baseline + snapshot deploy).
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - name: Decide whether to run
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          # Non-push events (pull_request, workflow_dispatch, …) always run.
          if [[ "$EVENT_NAME" != "push" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # The default branch always runs (post-merge baseline + snapshot deploy).
          if [[ "$REF_NAME" == "$DEFAULT_BRANCH" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Push to a non-default branch: skip if an open SAME-REPO PR already
          # covers it — the pull_request run builds the same commit (with PR-scoped
          # Sonar). Only internal PRs count: a fork PR that happens to reuse this
          # branch name builds a different repo's commit, so cross-repository PRs
          # are excluded (gh's --head matches a bare branch name across forks).
          # Fail open — a transient lookup error runs the build rather than skipping it.
          if ! count="$(gh pr list --repo "$GH_REPO" --head "$REF_NAME" --state open --json number,isCrossRepository --jq '[.[] | select(.isCrossRepository == false)] | length')"; then
            echo "PR lookup failed for '$REF_NAME' — defaulting to run push build"
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if [[ "${count:-0}" -gt 0 ]]; then
            echo "Open same-repo PR exists for '$REF_NAME' — skipping push build (the PR run builds this commit)"
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "No open same-repo PR for '$REF_NAME' — running push build"
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

  # Read project.yml configuration to use as defaults
  config:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      java-versions: ${{ steps.config.outputs.java-versions }}
      java-version: ${{ steps.config.outputs.java-version }}
      enable-snapshot-deploy: ${{ steps.config.outputs.enable-snapshot-deploy }}
      maven-profiles-snapshot: ${{ steps.config.outputs.maven-profiles-snapshot }}
      npm-cache: ${{ steps.config.outputs.npm-cache }}
      sonar-enabled: ${{ steps.config.outputs.sonar-enabled }}
      sonar-skip-on-dependabot: ${{ steps.config.outputs.sonar-skip-on-dependabot }}
      sonar-project-key: ${{ steps.config.outputs.sonar-project-key }}
      skip-on-docs-only: ${{ steps.config.outputs.skip-on-docs-only }}
      paths-ignore-extra: ${{ steps.config.outputs.paths-ignore-extra }}
      snapshot-deploy-timeout: ${{ steps.config.outputs.snapshot-deploy-timeout }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: .github/project.yml
          sparse-checkout-cone-mode: false

      - name: Read project.yml configuration
        id: config
        uses: cuioss/cuioss-organization/.github/actions/read-project-config@v0.10.0

  # Check if only documentation/config files changed (skip build if so).
  # Skipped on merge_group: paths-filter cannot auto-detect a diff base there,
  # and a merge-queue run must always build the full merge result anyway.
  check-changes:
    needs: config
    if: needs.config.outputs.skip-on-docs-only != 'false' && inputs.skip-on-docs-only && github.event_name != 'merge_group'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should-build: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build paths-filter spec
        id: build-filter
        env:
          EXTRA: ${{ needs.config.outputs.paths-ignore-extra }}
        run: |
          {
            echo 'spec<<EOF'
            echo 'code:'
            echo "  - '!**/*.adoc'"
            echo "  - '!**/*.md'"
            echo "  - '!doc/**'"
            echo "  - '!.plan/**'"
            echo "  - '!.claude/**'"
            echo "  - '!.github/project.yml'"
            echo "  - '!.github/dependabot.yml'"
            echo "  - '!LICENSE'"
            echo "  - '!NOTICE'"
            for pattern in $EXTRA; do
              echo "  - '!$pattern'"
            done
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: ${{ steps.build-filter.outputs.spec }}

  build:
    needs: [config, check-changes]
    if: always() && needs.check-changes.outputs.should-build != 'false' && needs.config.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        version: ${{ fromJson(needs.config.outputs.java-versions || inputs.java-versions) }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK ${{ matrix.version }}
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: ${{ matrix.version }}
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Cache npm packages
        if: ${{ needs.config.outputs.npm-cache == 'true' || inputs.npm-cache }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          # Cache npm's download cache AND installed node_modules so frontend builds
          # skip re-download and re-link on a cache hit. Keyed on the lock/manifest
          # files, so a dependency change busts it; a stale hit is simply overwritten.
          path: |
            ~/.npm
            **/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Build with Maven, Java ${{ matrix.version }}
        run: ./mvnw --no-transfer-progress verify -Dmaven.compiler.release=${{ matrix.version }}

  # Skipped on merge_group: there is no PR context, and analyzing the throwaway
  # gh-readonly-queue/* branch would pollute Sonar and slow the queue — the PR
  # run has already passed the Sonar gate before entering the queue.
  sonar-build:
    needs: [config, check-changes, build]
    if: ${{ always() && needs.check-changes.outputs.should-build != 'false' && needs.build.result == 'success' && github.event_name != 'merge_group' && (needs.config.outputs.sonar-enabled != 'false' && inputs.enable-sonar) && !((needs.config.outputs.sonar-skip-on-dependabot == 'true' || inputs.skip-sonar-on-dependabot) && github.actor == 'dependabot[bot]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ needs.config.outputs.java-version || inputs.java-version }} for Sonar-build
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: ${{ needs.config.outputs.java-version || inputs.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Cache SonarCloud packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache npm packages
        if: ${{ needs.config.outputs.npm-cache == 'true' || inputs.npm-cache }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          # Cache npm's download cache AND installed node_modules so frontend builds
          # skip re-download and re-link on a cache hit. Keyed on the lock/manifest
          # files, so a dependency change busts it; a stale hit is simply overwritten.
          path: |
            ~/.npm
            **/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./mvnw -B --no-transfer-progress verify -Psonar -Dsonar.projectKey=${{ needs.config.outputs.sonar-project-key }} -Dsonar.qualitygate.wait=true sonar:sonar

  deploy-snapshot:
    needs: [config, check-changes, sonar-build]
    if: ${{ always() && needs.check-changes.outputs.should-build != 'false' && (needs.config.outputs.enable-snapshot-deploy != 'false' && inputs.enable-snapshot-deploy) && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && (needs.sonar-build.result == 'success' || needs.sonar-build.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJson(needs.config.outputs.snapshot-deploy-timeout || inputs.snapshot-deploy-timeout) }}
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK ${{ needs.config.outputs.java-version || inputs.java-version }} for snapshot release
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: ${{ needs.config.outputs.java-version || inputs.java-version }}
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
          cache: maven

      - name: Cache npm packages
        if: ${{ needs.config.outputs.npm-cache == 'true' || inputs.npm-cache }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          # Cache npm's download cache AND installed node_modules so frontend builds
          # skip re-download and re-link on a cache hit. Keyed on the lock/manifest
          # files, so a dependency change busts it; a stale hit is simply overwritten.
          path: |
            ~/.npm
            **/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Extract project version
        id: project
        run: echo "version=$(./mvnw --no-transfer-progress help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Deploy Snapshot with Maven, version ${{ steps.project.outputs.version }}
        if: ${{ endsWith(steps.project.outputs.version, '-SNAPSHOT') }}
        run: |
          ./mvnw -B --no-transfer-progress -P${{ needs.config.outputs.maven-profiles-snapshot || inputs.maven-profiles-snapshot }} deploy -Dmaven.test.skip=true
        env:
          MAVEN_USERNAME: ${{ secrets.OSS_SONATYPE_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSS_SONATYPE_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  # Gate job for branch protection — always runs, reports aggregate result
  conclusion:
    if: always()
    needs: [config, check-changes, build, sonar-build, deploy-snapshot]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Evaluate workflow result
        run: |
          # Config must have succeeded
          if [[ "${{ needs.config.result }}" == "failure" ]]; then
            echo "::error::config job failed"
            exit 1
          fi
          # Docs-only: all downstream skips are expected
          if [[ "${{ needs.check-changes.outputs.should-build }}" == "false" ]]; then
            echo "Docs-only change — build correctly skipped"
            exit 0
          fi
          # Build must have succeeded
          if [[ "${{ needs.build.result }}" == "failure" || "${{ needs.build.result }}" == "cancelled" ]]; then
            echo "::error::build job failed or was cancelled"
            exit 1
          fi
          # Sonar: failure is an error; skipped is OK (disabled, dependabot, etc.)
          if [[ "${{ needs.sonar-build.result }}" == "failure" || "${{ needs.sonar-build.result }}" == "cancelled" ]]; then
            echo "::error::sonar-build job failed"
            exit 1
          fi
          # Deploy-snapshot: failure is an error; skipped is OK (not on main, etc.)
          if [[ "${{ needs.deploy-snapshot.result }}" == "failure" || "${{ needs.deploy-snapshot.result }}" == "cancelled" ]]; then
            echo "::error::deploy-snapshot job failed"
            exit 1
          fi
          echo "All jobs passed or were correctly skipped"
