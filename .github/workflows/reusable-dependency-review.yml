name: Dependency Review (Reusable)

on:
  workflow_call:
    inputs:
      fail-on-severity:
        description: 'Minimum severity to fail on (low, moderate, high, critical)'
        required: false
        type: string
        default: 'high'
      allow-licenses:
        description: 'Comma-separated list of allowed licenses'
        required: false
        type: string
        default: ''
      deny-licenses:
        description: 'Comma-separated list of denied licenses'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: ${{ inputs.fail-on-severity }}
          allow-licenses: ${{ inputs.allow-licenses }}
          deny-licenses: ${{ inputs.deny-licenses }}
