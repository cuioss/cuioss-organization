# Example: Copy this to your repo as .github/workflows/npm-build.yml
# Configuration is read from .github/project.yml - no inputs needed!
name: npm Build

on:
  push:
    branches: [main, "feature/*", "fix/*", "chore/*", "dependabot/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read  # the reusable workflow's gate reads open PRs to skip redundant push builds

jobs:
  build:
    uses: cuioss/cuioss-organization/.github/workflows/reusable-npm-build.yml@05fe424dc32f31daa2fc369fb52ca360d84a62f4 # v0.11.1
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
