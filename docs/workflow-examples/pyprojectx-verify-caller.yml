# Example: Pyprojectx verification workflow
# Copy this file to .github/workflows/python-verify.yml in your repository

name: Python Verify

on:
  push:
    branches: [main, "feature/*", "fix/*", "chore/*", "dependabot/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read  # the reusable workflow's gate reads open PRs to skip redundant push runs

jobs:
  verify:
    uses: cuioss/cuioss-organization/.github/workflows/reusable-pyprojectx-verify.yml@dd1b90a37f4c92f785eb935e57af9d3eba5da85c # v0.10.2
    # Optional inputs (all have sensible defaults):
    # with:
    #   python-version: '3.12'           # Leave empty to let uv manage from pyproject.toml
    #   cache-dependency-glob: 'uv.lock' # Glob pattern for cache dependencies
    #   upload-artifacts-on-failure: true # Upload test artifacts on failure
    #   verify-command: './pw verify'     # Command to run
