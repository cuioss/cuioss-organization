# Example: Maven build with custom options (override project.yml settings)
name: Maven Build

on:
  push:
    branches: [main, "feature/*", "fix/*", "chore/*", "dependabot/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:
  # Required when the repo uses a GitHub merge queue: without it the queued
  # checks never report and the queue times out. Inert for repos without one.
  merge_group:

permissions:
  contents: read
  pull-requests: read  # the reusable workflow's gate reads open PRs to skip redundant push builds

jobs:
  build:
    uses: cuioss/cuioss-organization/.github/workflows/reusable-maven-build.yml@dd1b90a37f4c92f785eb935e57af9d3eba5da85c # v0.10.2
    with:
      # Override project.yml settings with explicit inputs
      java-versions: '["21","25"]'
      enable-sonar: true
      enable-snapshot-deploy: true
      npm-cache: true  # Enable for projects with frontend
      maven-profiles-snapshot: 'release-snapshot,javadoc'
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      OSS_SONATYPE_USERNAME: ${{ secrets.OSS_SONATYPE_USERNAME }}
      OSS_SONATYPE_PASSWORD: ${{ secrets.OSS_SONATYPE_PASSWORD }}
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
