# Example: Copy this to your repo as .github/workflows/maven.yml
# Configuration is read from .github/project.yml - no inputs needed!
# Path filtering is handled inside the reusable workflow via project.yml settings.
name: Maven Build

# Every push builds (quality + Sonar branch analysis); every PR builds (Sonar
# pull-request analysis). The reusable workflow's gate skips a push build when an
# open PR already covers that commit, so there is no push/PR duplicate — no caller
# `if:` is needed. The gate reads open PRs, hence `pull-requests: read` below.
on:
  push:
    branches: [main, "feature/*", "fix/*", "chore/*", "release/*", "dependabot/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:
  # Required when the repo uses a GitHub merge queue: without it the queued
  # checks never report and the queue times out. Inert for repos without one.
  merge_group:

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    uses: cuioss/cuioss-organization/.github/workflows/reusable-maven-build.yml@05fe424dc32f31daa2fc369fb52ca360d84a62f4 # v0.11.1
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      OSS_SONATYPE_USERNAME: ${{ secrets.OSS_SONATYPE_USERNAME }}
      OSS_SONATYPE_PASSWORD: ${{ secrets.OSS_SONATYPE_PASSWORD }}
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
